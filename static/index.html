<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Download</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23007BFF'/></svg>">
    <!-- 引入外部字体 Inter，增强现代极简感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- PWA 清单 -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d0e15">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>

<body>
    <div class="background-glow"></div>
    <div class="container hero">
        <header>
            <h1>Paste, Click, <span class="gradient-text">Download</span>.</h1>
            <p>From YouTube, Instagram, X, Tiktok, Facebook.</p>
        </header>

        <main>
            <!-- 胶囊输入区域 -->
            <form class="input-group" id="download-form">
                <input type="url" id="video-url" placeholder="Paste your video link here..." required
                    autocomplete="off">
                <button type="submit" id="extract-btn">
                    <span>Search</span>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                    <div class="spinner" style="display: none;"></div>
                </button>
            </form>

            <!-- 结果展示区域 -->
            <div id="result-container" class="result-container" style="display: none;">
                <div class="video-info">
                    <div id="video-thumbnail" class="thumbnail"></div>
                    <div class="video-title" id="video-title">Loading...</div>
                </div>
                <div id="formats-list" class="formats-list">
                    <!-- 分辨率列表由 JS 动态生成 -->
                </div>
            </div>

            <!-- 错误提示组件 -->
            <div id="error-message" class="error-message" style="display: none;"></div>
        </main>
    </div>

    <!-- 引用核心 JS -->
    <script src="/static/script.js"></script>

    <!-- 注册 PWA 桌面应用 Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/service-worker.js')
                    .then(reg => console.log('PWA ServiceWorker registered', reg.scope))
                    .catch(err => console.error('PWA SW register failed:', err));
            });
        }
    </script>
</body>

</html>
